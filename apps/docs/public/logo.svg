<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Runek mark: Raidho (ᚱ), the journey rune, extruded along the iso axis. -->
  <!-- side faces -->
  <polygon points="11,5 14.4,1.6 14.4,23.6 11,27" fill="rgba(61,245,138,0.16)"/>
  <polygon points="11,5 14.4,1.6 24.4,6.6 21,10" fill="rgba(42,167,255,0.20)"/>
  <polygon points="21,10 24.4,6.6 14.4,11.6 11,15" fill="rgba(42,167,255,0.12)"/>
  <polygon points="11,15 14.4,11.6 24.4,23.6 21,27" fill="rgba(42,167,255,0.16)"/>
  <!-- back outline -->
  <path d="M14.4 1.6 V23.6 M14.4 1.6 L24.4 6.6 L14.4 11.6 L24.4 23.6"
    fill="none" stroke="#1e7a4b" stroke-width="1.6" stroke-linecap="square"/>
  <!-- extrusion edges -->
  <g stroke="#2aa7ff" stroke-width="0.9" opacity="0.75">
    <line x1="11" y1="5" x2="14.4" y2="1.6"/>
    <line x1="21" y1="10" x2="24.4" y2="6.6"/>
    <line x1="11" y1="15" x2="14.4" y2="11.6"/>
    <line x1="11" y1="27" x2="14.4" y2="23.6"/>
    <line x1="21" y1="27" x2="24.4" y2="23.6"/>
  </g>
  <!-- front outline -->
  <path d="M11 5 V27 M11 5 L21 10 L11 15 L21 27"
    fill="none" stroke="#3df58a" stroke-width="2.6" stroke-linecap="square"/>
</svg>
